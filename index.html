<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poTATo的阳间工具库！</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #000;
        }
        .file-list {
            margin-top: 20px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .file-item:hover {
            background-color: #f0f0f0;
        }
        .file-name {
            font-weight: bold;
            color: #000;
        }
        .download-link {
            text-decoration: none;
            color: #000;
            padding: 5px 10px;
            border: 1px solid #000;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .download-link:hover {
            background-color: #000;
            color: white;
        }
        .no-files {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        .search-input:focus {
            outline: none;
            border-color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>工具库</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索文件..." class="search-input">
        </div>
        <div class="file-list" id="fileList">
            <!-- 文件列表将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <script>
        // GitHub 仓库信息
        const githubRepo = "https://raw.githubusercontent.com/poTATo-nb/poTATo-nb.github.io/main/";

        // 文件列表
        const files = [
            "unicode_converter5.0.0.zip",
            "FS2.zip",
            "burglar.zip"
            "tk1.exe"
            // 添加其他文件
        ];

        // 生成文件列表
        function generateFileList(filter = '') {
            const fileList = document.getElementById('fileList');
            
            // 过滤文件
            const filteredFiles = files.filter(file => 
                file.toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filteredFiles.length === 0) {
                fileList.innerHTML = '<div class="no-files">没有找到文件</div>';
                return;
            }

            let html = '';
            filteredFiles.forEach(file => {
                // 生成 GitHub 下载链接
                const downloadUrl = githubRepo + file;
                html += `
                    <div class="file-item">
                        <span class="file-name">${file}</span>
                        <a href="${downloadUrl}" class="download-link" download>下载</a>
                    </div>
                `;
            });
            
            fileList.innerHTML = html;
        }

        // 绑定搜索事件
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                generateFileList(this.value);
            });
        }

        // 页面加载时生成文件列表和设置搜索
        window.onload = function() {
            generateFileList();
            setupSearch();
        };
    </script>
</body>
</html>
