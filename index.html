<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>poTATo的工具库！</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            background-image: 
                linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
                linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            color: #ffffff;
        }
        .file-list {
            margin-top: 20px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #555555;
        }
        .file-item:hover {
            background-color: #3a3a3a;
        }
        .file-name {
            font-weight: bold;
            color: #ffffff;
        }
        .download-link {
            text-decoration: none;
            color: #ffffff;
            padding: 5px 10px;
            border: 1px solid #ffffff;
            border-radius: 4px;
            background-color: #2a2a2a;
            transition: all 0.3s ease;
        }
        .download-link:hover {
            background-color: #ffffff;
            color: #000;
        }
        .no-files {
            text-align: center;
            color: #999999;
            padding: 20px;
        }
        .search-container {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #555555;
            border-radius: 4px;
            font-size: 16px;
            background-color: #3a3a3a;
            color: #ffffff;
        }
        .search-input:focus {
            outline: none;
            border-color: #ffffff;
        }
        .password-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        .password-container.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .password-form {
            background-color: #2a2a2a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(1);
            transition: transform 0.3s ease;
        }
        .password-form h2 {
            color: #ffffff;
        }
        .password-container.hidden .password-form {
            transform: scale(0.8);
        }
        .password-input {
            width: 100%;
            padding: 15px;
            border: 1px solid #555555;
            border-radius: 4px;
            font-size: 16px;
            margin: 20px 0;
            background-color: #3a3a3a;
            color: #ffffff;
        }
        .password-input:focus {
            outline: none;
            border-color: #ffffff;
        }
        .password-button {
            padding: 12px 30px;
            background-color: #3a3a3a;
            color: #ffffff;
            border: 1px solid #ffffff;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .password-button:hover {
            background-color: #ffffff;
            color: #000;
        }
        .password-error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }
        #toolContainer {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #toolContainer.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal.visible .modal-content {
            transform: scale(1);
        }
        /* 错误弹窗样式 */
        #errorModal {
            background-color: rgba(255, 68, 68, 0.4);
        }
        #errorModal .modal-content {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0) scale(1); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px) scale(1); }
            20%, 40%, 60%, 80% { transform: translateX(5px) scale(1); }
        }
        .modal h3 {
            margin-top: 0;
            color: #ffffff;
        }
        .modal p {
            margin: 10px 0;
            color: #999999;
        }
        .modal-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3a3a3a;
            color: #ffffff;
            border: 1px solid #ffffff;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .modal-button:hover {
            background-color: #ffffff;
            color: #000;
        }
        .close-button {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #999999;
        }
        .close-button:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <!-- 密码输入容器 -->
    <div class="password-container" id="passwordContainer">
        <div class="password-form">
            <h2>请输入工具库密码</h2>
            <input type="password" id="passwordInput" placeholder="密码" class="password-input">
            <button class="password-button" onclick="checkPassword()">确认</button>
            <div class="password-error" id="passwordError"></div>
        </div>
    </div>

    <div class="container" id="toolContainer" style="display: none;">
        <h1>工具库</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="搜索文件..." class="search-input">
        </div>
        <div class="file-list" id="fileList">
            <!-- 文件列表将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <!-- 下载弹窗 -->
    <div class="modal" id="downloadModal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h3 id="modalFileName">文件名</h3>
            <p id="modalFileInfo">文件信息</p>
            <a href="#" id="modalDownloadLink" class="modal-button" download>下载</a>
        </div>
    </div>

    <!-- 错误弹窗 -->
    <div class="modal" id="errorModal">
        <div class="modal-content">
            <span class="close-button" onclick="closeErrorModal()">&times;</span>
            <h3 style="color: #ff4444ff;">错误</h3>
            <p id="errorMessage">发生错误，请重试</p>
            <button class="modal-button" onclick="closeErrorModal()">确定</button>
        </div>
    </div>

    <script>
        // GitHub 仓库信息
        const githubRepo = "https://raw.githubusercontent.com/poTATo-nb/poTATo-nb.github.io/main/";

        // 文件列表
        const files = [
            "unicode_converter5.0.0.zip",
            "FS2.zip",
            "burglar.zip",
            "tk1.exe",
            "BLUE.zip",
            "Hsha.exe",
            "ZIP_PASSWORD.zip",
            "Jsq.zip"
            // 添加其他文件
        ];

        // 生成文件列表
        function generateFileList(filter = '') {
            const fileList = document.getElementById('fileList');
            
            // 过滤文件
            const filteredFiles = files.filter(file => 
                file.toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filteredFiles.length === 0) {
                fileList.innerHTML = '<div class="no-files">没有找到文件</div>';
                return;
            }

            let html = '';
            filteredFiles.forEach(file => {
                // 生成 GitHub 下载链接
                let downloadUrl;
                if (file === 'BLUE.zip') {
                    // BLUE.zip 指向 GitHub Releases
                    downloadUrl = 'https://github.com/poTATo-nb/poTATo-nb.github.io/releases/download/v1.0/BLUE.zip';
                } else {
                    downloadUrl = githubRepo + file;
                }
                html += `
                    <div class="file-item">
                        <span class="file-name">${file}</span>
                        <button class="download-link" onclick="showDownloadModal('${file}', '${downloadUrl}')">下载</button>
                    </div>
                `;
            });
            
            fileList.innerHTML = html;
        }

        // 显示下载弹窗
        function showDownloadModal(fileName, downloadUrl) {
            const modal = document.getElementById('downloadModal');
            const modalFileName = document.getElementById('modalFileName');
            const modalFileInfo = document.getElementById('modalFileInfo');
            const modalDownloadLink = document.getElementById('modalDownloadLink');
            
            // 设置弹窗内容
            modalFileName.textContent = fileName;
            modalFileInfo.textContent = '点击下方按钮开始下载此文件';
            
            // 添加下载事件处理
            modalDownloadLink.onclick = function(e) {
                e.preventDefault(); // 先阻止默认下载行为
                
                // 检查文件是否存在
                fetch(downloadUrl, { method: 'HEAD' })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('文件无法访问');
                        }
                        // 文件存在，手动触发下载
                        window.location.href = downloadUrl;
                    })
                    .catch(error => {
                        showErrorModal('下载失败：' + error.message);
                    });
            };
            
            modalDownloadLink.href = downloadUrl;
            
            // 显示弹窗
            modal.classList.add('visible');
        }

        // 关闭弹窗
        function closeModal() {
            const modal = document.getElementById('downloadModal');
            modal.classList.remove('visible');
        }

        // 点击弹窗外部关闭弹窗
        window.onclick = function(event) {
            const modal = document.getElementById('downloadModal');
            const errorModal = document.getElementById('errorModal');
            if (event.target == modal) {
                closeModal();
            } else if (event.target == errorModal) {
                closeErrorModal();
            }
        };

        // 显示错误弹窗
        function showErrorModal(message) {
            const errorModal = document.getElementById('errorModal');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorModal.classList.add('visible');
        }

        // 关闭错误弹窗
        function closeErrorModal() {
            const errorModal = document.getElementById('errorModal');
            errorModal.classList.remove('visible');
        }

        // 绑定搜索事件
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                generateFileList(this.value);
            });
        }

        // 密码验证函数（使用直接比较，确保功能正常）
        function checkPassword() {
            const passwordInput = document.getElementById('passwordInput');
            const passwordError = document.getElementById('passwordError');
            const passwordContainer = document.getElementById('passwordContainer');
            const toolContainer = document.getElementById('toolContainer');

            // 正确密码
            const correctPassword = "qwertyuiop";

            if (passwordInput.value === correctPassword) {
                // 密码正确，显示工具库（带动画）
                passwordContainer.classList.add('hidden');
                setTimeout(() => {
                    toolContainer.style.display = 'block';
                    setTimeout(() => {
                        toolContainer.classList.add('visible');
                    }, 100);
                }, 500);
                generateFileList();
                setupSearch();
            } else {
                // 密码错误，显示错误信息
                passwordError.textContent = '密码错误，请重新输入';
            }
        }

        // 按下回车键也可以验证密码
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // 页面加载时只显示密码输入界面
        window.onload = function() {
            // 工具库容器默认隐藏
            document.getElementById('toolContainer').style.display = 'none';
        };
    </script>
    <footer style="text-align: center; margin-top: 20px; color: #999999; font-size: 14px;">
        <h3 style="color: #ffffff83;">作者：poTATo</h3>
        <h3 style="color: #ffffff83;">开发语言：html</h3>
        <h3 style="color: #ffffff83;">开发环境：GitHub</h3>
    </footer>
</body>
</html>
