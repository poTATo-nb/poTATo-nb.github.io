<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八卦字符翻译器</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .mode-toggle {
            text-align: center;
            margin-bottom: 20px;
        }
        .mode-button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            margin: 0 5px;
            transition: background-color 0.3s;
        }
        .mode-button.active {
            background-color: #45a049;
        }
        .input-section {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
            min-height: 100px;
            font-size: 16px;
        }
        .button-section {
            text-align: center;
            margin-bottom: 20px;
        }
        .translate-button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #008CBA;
            color: white;
            transition: background-color 0.3s;
        }
        .translate-button:hover {
            background-color: #007bb5;
        }
        .result-section {
            margin-top: 20px;
        }
        .result-box {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            min-height: 100px;
            font-size: 16px;
            white-space: pre-wrap;
        }
        .instructions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .instructions h3 {
            margin-top: 0;
        }
        .instructions ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>八卦字符翻译器</h1>
        
        <div class="mode-toggle">
            <button class="mode-button active" id="encrypt-mode">翻译模式</button>
            <button class="mode-button" id="decrypt-mode">原始模式</button>
        </div>
        
        <div class="input-section">
            <label for="input-text">输入文本：</label>
            <textarea id="input-text" placeholder="请输入要翻译的文本..."></textarea>
        </div>
        
        <div class="button-section">
            <button class="translate-button" id="translate-button">翻译</button>
        </div>
        
        <div class="result-section">
            <label for="result-text">结果：</label>
            <div class="result-box" id="result-text"></div>
        </div>
        
        <div class="instructions">
            <h3>使用说明：</h3>
            <ul>
                <li><strong>翻译模式</strong>：将英文文本转换为八卦字符</li>
                <li><strong>原始模式</strong>：将八卦字符转换回英文文本</li>
                <li>支持小写字母、大写字母、数字和连字符号</li>
                <li>其他字符会保持不变</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 定义八卦符映射（0-7）
        const baguaSymbols = ['☰', '☱', '☲', '☳', '☴', '☵', '☶', '☷'];
        
        // 定义字母排序映射
        const lowercase = 'abcdefghijklmnopqrstuvwxyz';
        const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        
        // 当前模式：true为翻译模式，false为原始模式
        let translateMode = true;
        
        // 翻译模式切换
        document.getElementById('encrypt-mode').addEventListener('click', function() {
            translateMode = true;
            document.getElementById('encrypt-mode').classList.add('active');
            document.getElementById('decrypt-mode').classList.remove('active');
        });
        
        document.getElementById('decrypt-mode').addEventListener('click', function() {
            translateMode = false;
            document.getElementById('decrypt-mode').classList.add('active');
            document.getElementById('encrypt-mode').classList.remove('active');
        });
        
        // 翻译按钮点击事件
        document.getElementById('translate-button').addEventListener('click', function() {
            const inputText = document.getElementById('input-text').value;
            let result;
            
            if (translateMode) {
                result = translateToBagua(inputText);
            } else {
                result = translateFromBagua(inputText);
            }
            
            document.getElementById('result-text').textContent = result;
        });
        
        // 翻译为八卦字符
        function translateToBagua(text) {
            const result = [];
            
            for (const char of text) {
                if (lowercase.includes(char)) {
                    // 小写字母：9+字母排序
                    const num = 9 + lowercase.indexOf(char) + 1;
                    processNumber(num, result);
                } else if (uppercase.includes(char)) {
                    // 大写字母：35+字母排序
                    const num = 35 + uppercase.indexOf(char) + 1;
                    processNumber(num, result);
                } else if (char === '-') {
                    // 连字符号：63
                    processNumber(63, result);
                } else if (!isNaN(char) && char !== ' ') {
                    // 数字：保持不变
                    processNumber(parseInt(char), result);
                } else {
                    // 其他字符：保留
                    result.push(char);
                }
            }
            
            return result.join('');
        }
        
        // 处理数字转换
        function processNumber(num, result) {
            // 转换为两位数八进制
            const octal = num.toString(8).padStart(2, '0');
            
            // 将每个八进制数字转换为八卦符
            const baguaChars = [];
            for (const digit of octal) {
                const digitNum = parseInt(digit);
                baguaChars.push(baguaSymbols[digitNum]);
            }
            
            // 拼接两个八卦符
            result.push(baguaChars.join(''));
        }
        
        // 从八卦字符翻译回原文
        function translateFromBagua(text) {
            const result = [];
            let i = 0;
            
            while (i < text.length) {
                // 检查是否是八卦符
                if (i + 1 < text.length && 
                    baguaSymbols.includes(text[i]) && 
                    baguaSymbols.includes(text[i+1])) {
                    
                    // 获取两个八卦符
                    const symbol1 = text[i];
                    const symbol2 = text[i+1];
                    
                    // 转换为八进制数字
                    const digit1 = baguaSymbols.indexOf(symbol1);
                    const digit2 = baguaSymbols.indexOf(symbol2);
                    const octal = `${digit1}${digit2}`;
                    
                    // 转换为十进制
                    const num = parseInt(octal, 8);
                    
                    // 转换为原始字符
                    let char;
                    if (num >= 10 && num <= 35) {
                        // 小写字母
                        char = lowercase[num - 10];
                    } else if (num >= 36 && num <= 61) {
                        // 大写字母
                        char = uppercase[num - 36];
                    } else if (num === 63) {
                        // 连字符号
                        char = '-';
                    } else if (num >= 0 && num <= 9) {
                        // 数字
                        char = num.toString();
                    } else {
                        // 无法识别的数字，保留原始符号
                        char = `${symbol1}${symbol2}`;
                    }
                    
                    result.push(char);
                    i += 2;
                } else {
                    // 不是八卦符，保留原始字符
                    result.push(text[i]);
                    i += 1;
                }
            }
            
            return result.join('');
        }
    </script>
</body>
</html>
